<mat-sidenav-container class="side-container">
  <mat-sidenav
    #sidenav
    mode="side"
    opened
    [fixedInViewport]="false"
    [fixedTopGap]="0"
    [fixedBottomGap]="0"
    class="side-panel background-blue"
  >
    <div class="logo-container p-3">
      <p class="company-title py-2 m-0">Warehouse Management System</p>
    </div>

    <div class="menu-container p-2">
      <mat-accordion>
        <mat-expansion-panel *ngFor="let item of LayoutLst" [expanded]="isExpanded(item)">
          <mat-expansion-panel-header (click)="toggleItem(item)">
            <mat-panel-title>
              {{ item?.name }}
            </mat-panel-title>
            <mat-panel-description>
            </mat-panel-description>
          </mat-expansion-panel-header>

          <!-- children list -->
          <ng-container *ngIf="item?.children?.length">
            <div
              *ngFor="let child of item.children"
              class="menu-item child-item pointer p-0"
              (click)="$event.stopPropagation(); openPages(child)"
            >
              - {{ child.name }}
            </div>
          </ng-container>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet></router-outlet>

    <button mat-mini-fab (click)="sidenav.toggle()" class="action-btn">
      <mat-icon>{{
        sidenav?.opened ? "keyboard_arrow_left" : "keyboard_arrow_right"
      }}</mat-icon>
    </button>
  </mat-sidenav-content>
</mat-sidenav-container>
